<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Component: Horizontal Roll Popover - Interactive Interface</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">
    <header>
      <span class="badge">Interactive Interface</span>
      <h1>Horizontal Roll Popover</h1>
      <p class="subtitle">Roll-in animation with horizontal reveal</p>
    </header>

    <div class="display-area">
      <div class="popover-container">
        <button class="trigger-btn" aria-label="Show options">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="3" y1="12" x2="21" y2="12"/>
            <line x1="3" y1="6" x2="21" y2="6"/>
            <line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
          Options
        </button>
        <div class="roll-popover" role="tooltip">
          <div class="roll-item" style="--delay: 0s">
            <span class="roll-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                <polyline points="9,22 9,12 15,12 15,22"/>
              </svg>
            </span>
            <span>Dashboard</span>
          </div>
          <div class="roll-item" style="--delay: 0.05s">
            <span class="roll-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="3" width="18" height="18" rx="2"/>
                <path d="M3 9h18M9 21V9"/>
              </svg>
            </span>
            <span>Projects</span>
          </div>
          <div class="roll-item" style="--delay: 0.1s">
            <span class="roll-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
              </svg>
            </span>
            <span>Profile</span>
          </div>
          <div class="roll-item" style="--delay: 0.15s">
            <span class="roll-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="3"/>
                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4"/>
              </svg>
            </span>
            <span>Settings</span>
          </div>
        </div>
      </div>
    </div>

    <section class="demo-section">
      <h3>Animation Variants</h3>
      <div class="variants-grid">
        <div class="popover-container">
          <button class="trigger-btn small">Sweep</button>
          <div class="roll-popover sweep" role="tooltip"><p>Sweep roll animation</p></div>
        </div>
        <div class="popover-container">
          <button class="trigger-btn small">Wave</button>
          <div class="roll-popover wave" role="tooltip"><p>Wave roll animation</p></div>
        </div>
        <div class="popover-container">
          <button class="trigger-btn small">Zip</button>
          <div class="roll-popover zip" role="tooltip"><p>Zip roll animation</p></div>
        </div>
      </div>
    </section>

    <section class="demo-section">
      <h3>Color Themes</h3>
      <div class="themes-grid">
        <div class="popover-container">
          <button class="trigger-btn small theme-indigo">Indigo</button>
          <div class="roll-popover theme-indigo" role="tooltip"><p>Indigo theme</p></div>
        </div>
        <div class="popover-container">
          <button class="trigger-btn small theme-emerald">Emerald</button>
          <div class="roll-popover theme-emerald" role="tooltip"><p>Emerald theme</p></div>
        </div>
        <div class="popover-container">
          <button class="trigger-btn small theme-orange">Orange</button>
          <div class="roll-popover theme-orange" role="tooltip"><p>Orange theme</p></div>
        </div>
      </div>
    </section>

  </main>

</body>
</html>
