<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Component: Slide-Right Popover - Product Catalog</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">
    <header>
      <span class="badge">Product Catalog</span>
      <h1>Slide-Right Popover</h1>
      <p class="subtitle">Product slide animation</p>
    </header>

    <div class="display-area">
      <div class="popover-container">
        <button class="product-btn" aria-label="Quick view">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
          Quick View
        </button>
        <div class="slide-popover" role="tooltip">
          <div class="slide-product">
            <div class="product-image">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <rect x="3" y="3" width="18" height="18" rx="2"/>
                <circle cx="8.5" cy="8.5" r="1.5"/>
                <path d="M21 15l-5-5L5 21"/>
              </svg>
            </div>
            <div class="product-info">
              <h4>Wireless Headphones</h4>
              <p class="product-price">$299.00</p>
              <div class="product-rating">
                <span class="stars">★★★★★</span>
                <span class="count">(128)</span>
              </div>
            </div>
          </div>
          <div class="slide-actions">
            <button class="product-cta primary">Add to Cart</button>
            <button class="product-cta secondary">Wishlist</button>
          </div>
        </div>
      </div>
    </div>

    <section class="demo-section">
      <h3>Animation Variants</h3>
      <div class="variants-grid">
        <div class="popover-container">
          <button class="trigger-btn small">Slide</button>
          <div class="slide-popover slide" role="tooltip"><p>Slide animation</p></div>
        </div>
        <div class="popover-container">
          <button class="trigger-btn small">Pop</button>
          <div class="slide-popover pop" role="tooltip"><p>Pop animation</p></div>
        </div>
        <div class="popover-container">
          <button class="trigger-btn small">Sweep</button>
          <div class="slide-popover sweep" role="tooltip"><p>Sweep animation</p></div>
        </div>
      </div>
    </section>

    <section class="demo-section">
      <h3>Color Themes</h3>
      <div class="themes-grid">
        <div class="popover-container">
          <button class="trigger-btn small theme-purple">Purple</button>
          <div class="slide-popover theme-purple" role="tooltip"><p>Purple product theme</p></div>
        </div>
        <div class="popover-container">
          <button class="trigger-btn small theme-teal">Teal</button>
          <div class="slide-popover theme-teal" role="tooltip"><p>Teal product theme</p></div>
        </div>
        <div class="popover-container">
          <button class="trigger-btn small theme-rose">Rose</button>
          <div class="slide-popover theme-rose" role="tooltip"><p>Rose product theme</p></div>
        </div>
      </div>
    </section>

  </main>

</body>
</html>
