<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS-only Liquid Glass Floating Dock</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="shell">
      <section class="card" aria-label="Liquid Glass Floating Dock demo">
        <p class="eyebrow">EaseMotion CSS</p>
        <h1>CSS-only Liquid Glass Floating Dock</h1>
        <p>A macOS-style floating dock with glass morphism effect and smooth magnification.</p>
        
        <div class="dock-container">
          <div class="ease-dock-liquid-sb">
            <a href="#" class="ease-dock-item-sb" data-label="Finder">
              <div class="dock-icon finder"></div>
            </a>
            <a href="#" class="ease-dock-item-sb" data-label="Safari">
              <div class="dock-icon safari"></div>
            </a>
            <a href="#" class="ease-dock-item-sb" data-label="Messages">
              <div class="dock-icon messages"></div>
            </a>
            <a href="#" class="ease-dock-item-sb" data-label="Mail">
              <div class="dock-icon mail"></div>
            </a>
            <a href="#" class="ease-dock-item-sb" data-label="Photos">
              <div class="dock-icon photos"></div>
            </a>
            <a href="#" class="ease-dock-item-sb" data-label="Music">
              <div class="dock-icon music"></div>
            </a>
            <a href="#" class="ease-dock-item-sb" data-label="Calendar">
              <div class="dock-icon calendar"></div>
            </a>
            <a href="#" class="ease-dock-item-sb" data-label="Notes">
              <div class="dock-icon notes"></div>
            </a>
            <div class="dock-separator"></div>
            <a href="#" class="ease-dock-item-sb" data-label="Trash">
              <div class="dock-icon trash"></div>
            </a>
          </div>
        </div>
        
        <div class="info-box">
          <p><strong>Hover</strong> over dock icons to see magnification effect</p>
          <p><strong>CSS-only</strong> implementation using transforms and filters</p>
        </div>
      </section>
    </main>
  </body>
</html>
