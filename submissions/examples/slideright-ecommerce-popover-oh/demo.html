<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Component: Slide-Right Popover - E-Commerce Checkout</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">
    <header>
      <span class="badge">E-Commerce Checkout</span>
      <h1>Slide-Right Popover</h1>
      <p class="subtitle">Checkout slide animation</p>
    </header>

    <div class="display-area">
      <div class="popover-container">
        <button class="ecom-btn" aria-label="View cart">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="9" cy="21" r="1"/>
            <circle cx="20" cy="21" r="1"/>
            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
          </svg>
          <span class="ecom-badge">3</span>
        </button>
        <div class="slide-popover" role="tooltip">
          <div class="slide-header">
            <h4>Your Cart</h4>
            <span class="slide-count">3 items</span>
          </div>
          <div class="slide-items">
            <div class="slide-item" style="--delay: 0s">
              <div class="item-image">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                  <rect x="3" y="3" width="18" height="18" rx="2"/>
                  <circle cx="8.5" cy="8.5" r="1.5"/>
                  <path d="M21 15l-5-5L5 21"/>
                </svg>
              </div>
              <div class="item-info">
                <span class="item-name">Premium Headphones</span>
                <span class="item-price">$299.00</span>
              </div>
            </div>
            <div class="slide-item" style="--delay: 0.05s">
              <div class="item-image">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                  <rect x="3" y="3" width="18" height="18" rx="2"/>
                  <circle cx="8.5" cy="8.5" r="1.5"/>
                  <path d="M21 15l-5-5L5 21"/>
                </svg>
              </div>
              <div class="item-info">
                <span class="item-name">Smart Watch</span>
                <span class="item-price">$199.00</span>
              </div>
            </div>
          </div>
          <div class="slide-footer">
            <div class="slide-total">
              <span>Total:</span>
              <span>$498.00</span>
            </div>
            <button class="ecom-cta">Checkout</button>
          </div>
        </div>
      </div>
    </div>

    <section class="demo-section">
      <h3>Animation Variants</h3>
      <div class="variants-grid">
        <div class="popover-container">
          <button class="trigger-btn small">Slide</button>
          <div class="slide-popover slide" role="tooltip"><p>Slide animation</p></div>
        </div>
        <div class="popover-container">
          <button class="trigger-btn small">Scale</button>
          <div class="slide-popover scale" role="tooltip"><p>Scale animation</p></div>
        </div>
        <div class="popover-container">
          <button class="trigger-btn small">Sweep</button>
          <div class="slide-popover sweep" role="tooltip"><p>Sweep animation</p></div>
        </div>
      </div>
    </section>

    <section class="demo-section">
      <h3>Color Themes</h3>
      <div class="themes-grid">
        <div class="popover-container">
          <button class="trigger-btn small theme-orange">Orange</button>
          <div class="slide-popover theme-orange" role="tooltip"><p>Orange theme</p></div>
        </div>
        <div class="popover-container">
          <button class="trigger-btn small theme-amber">Amber</button>
          <div class="slide-popover theme-amber" role="tooltip"><p>Amber theme</p></div>
        </div>
        <div class="popover-container">
          <button class="trigger-btn small theme-red">Red</button>
          <div class="slide-popover theme-red" role="tooltip"><p>Red theme</p></div>
        </div>
      </div>
    </section>

  </main>

</body>
</html>
