<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SaaS Application Security Monitoring Console - Phase 25</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="cognitive-grid"></div>
  <div class="ambient-bg"><div class="blob blob-1"></div><div class="blob blob-2"></div></div>
  <div class="app-container">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo"><span class="logo-text">COGNITIVE // 25</span></div>
        <button class="sidebar-toggle" id="sidebar-toggle">☰</button>
      </div>
      <nav class="sidebar-nav">
        <a href="#workspace" class="nav-item active">Intelligent Workspace</a>
        <a href="#analytics" class="nav-item">Telemetry</a>
      </nav>
      <div class="sidebar-footer">
        <div class="status-indicator">
          <div class="status-dot"></div>
          <span>Active Orchestrator</span>
        </div>
      </div>
    </aside>
    <main class="main-content">
      <header class="top-bar">
        <div class="top-bar-left">
          <span class="badge-tag">Phase 25</span>
          <h1>SaaS Application Security Monitoring Console</h1>
        </div>
      </header>
      
      <section class="workspace-section" id="workspace">
        <div class="sec-console">
  <h2>Vulnerability Radar</h2>
  <div class="threat-alert">
    <div class="severity-indicator high">HIGH</div>
    <div class="alert-details">
      <h3>SQL Injection attempt blocked</h3>
      <p>IP: 198.51.100.42 | Port: 443</p>
    </div>
  </div>
</div>
      </section>
    </main>
  </div>
  <script>
    document.getElementById('sidebar-toggle').addEventListener('click', () => {
      document.getElementById('sidebar').classList.toggle('collapsed');
    });
  </script>
</body>
</html>
