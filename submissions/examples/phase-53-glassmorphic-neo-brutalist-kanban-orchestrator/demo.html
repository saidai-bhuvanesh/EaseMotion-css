<DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glassmorphic Neo-Brutalist Kanban Orchestrator</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="dashboard-wrap">
    <header class="dashboard-header">
      <h1>Boardroom Task Orchestrator</h1>
      <span class="badge">Neo-Brutalist // v1.0</span>
    </header>
    
    <div class="kanban-board">
      <div class="kanban-column">
        <h2>To Do</h2>
        <div class="column-cards">
          <div class="kanban-card">
            <span class="card-badge">DESIGN</span>
            <h3>Implement Trigonometric Radians</h3>
            <p>Develop orbit offsets for spatial menus.</p>
          </div>
        </div>
      </div>
      
      <div class="kanban-column">
        <h2>In Progress</h2>
        <div class="column-cards">
          <div class="kanban-card active">
            <span class="card-badge dev">DEV</span>
            <h3>Matrix falling columns code</h3>
            <p>Inject staggered animation delays dynamically.</p>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
