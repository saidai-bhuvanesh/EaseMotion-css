# PROPOSED CI WORKFLOW SNIPPET FOR MAINTAINERS
# Add this step to .github/workflows/ci.yml

name: CI
on: [pull_request]

jobs:
  validate-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Verify minified file is up to date
        run: |
          npm run build
          git diff --exit-code easemotion.min.css || { echo "❌ easemotion.min.css is out of sync with easemotion.css. Please run 'npm run build' locally and commit the changes." ; exit 1; }
