<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Morph-Glow Toast - Creative Portfolio</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main>
    <section class="demo-section">
      <h1>Morph-Glow Toast</h1>
      <p>Click buttons to see different toast notifications</p>
      
      <div class="demo-buttons">
        <button onclick="showToast('info')" class="demo-btn info">Show Info Toast</button>
        <button onclick="showToast('success')" class="demo-btn success">Show Success Toast</button>
        <button onclick="showToast('warning')" class="demo-btn warning">Show Warning Toast</button>
        <button onclick="showToast('error')" class="demo-btn error">Show Error Toast</button>
      </div>
    </section>
  </main>
  
  <div class="ease-toast-container-sb" id="toastContainer"></div>
  
  <script>
    function showToast(type) {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = `ease-toast-sb ${type}`;
      
      const icons = {
        info: 'ℹ️',
        success: '✅',
        warning: '⚠️',
        error: '❌'
      };
      
      const titles = {
        info: 'Information',
        success: 'Success!',
        warning: 'Warning',
        error: 'Error'
      };
      
      const messages = {
        info: 'Your changes have been saved successfully.',
        success: 'Your project has been created and is ready to use.',
        warning: 'Please review your settings before continuing.',
        error: 'Something went wrong. Please try again.'
      };
      
      toast.innerHTML = `
        <div class="ease-toast-icon-sb">${icons[type]}</div>
        <div class="ease-toast-content-sb">
          <div class="ease-toast-title-sb">${titles[type]}</div>
          <div class="ease-toast-message-sb">${messages[type]}</div>
        </div>
        <button class="ease-toast-close-sb" onclick="this.parentElement.remove()">×</button>
        <div class="ease-toast-progress-sb"></div>
      `;
      
      container.appendChild(toast);
      
      setTimeout(() => {
        if (toast.parentElement) {
          toast.remove();
        }
      }, 5000);
    }
  </script>
  
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 100%);
      font-family: system-ui, -apple-system, sans-serif;
    }
    
    .demo-section {
      max-width: 600px;
      margin: 0 auto;
      padding: 80px 20px;
      text-align: center;
    }
    
    .demo-section h1 {
      color: #ffffff;
      font-size: 36px;
      margin-bottom: 12px;
    }
    
    .demo-section p {
      color: #9090b0;
      margin-bottom: 40px;
      font-size: 16px;
    }
    
    .demo-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
    }
    
    .demo-btn {
      padding: 14px 24px;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    
    .demo-btn.info {
      background: linear-gradient(135deg, #22d3ee, #06b6d4);
      color: #0f0f1a;
    }
    
    .demo-btn.success {
      background: linear-gradient(135deg, #4ade80, #22c55e);
      color: #0f0f1a;
    }
    
    .demo-btn.warning {
      background: linear-gradient(135deg, #fbbf24, #f59e0b);
      color: #0f0f1a;
    }
    
    .demo-btn.error {
      background: linear-gradient(135deg, #f87171, #ef4444);
      color: #ffffff;
    }
    
    .demo-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
    }
  </style>
</body>
</html>
