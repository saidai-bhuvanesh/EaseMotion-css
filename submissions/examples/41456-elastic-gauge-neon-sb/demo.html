<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Elastic Gauge for Neon</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="shell">
      <section class="card" aria-label="Elastic Gauge Neon demo">
        <p class="eyebrow">EaseMotion CSS</p>
        <h1>Elastic Gauge for Neon</h1>
        <p>Neon-styled gauge component with elastic animation.</p>
        
        <div class="demo-section">
          <h3>Speed Gauge</h3>
          <div class="ease-gauge-neon-sb ease-gauge-speed-sb">
            <div class="gauge-track">
              <div class="gauge-fill"></div>
            </div>
            <div class="gauge-value">75</div>
            <div class="gauge-label">MPH</div>
          </div>
        </div>
        
        <div class="demo-section">
          <h3>CPU Usage Gauge</h3>
          <div class="ease-gauge-neon-sb ease-gauge-cpu-sb">
            <div class="gauge-track">
              <div class="gauge-fill"></div>
            </div>
            <div class="gauge-value">82</div>
            <div class="gauge-label">%</div>
          </div>
        </div>
        
        <div class="demo-section">
          <h3>Storage Gauge</h3>
          <div class="ease-gauge-neon-sb ease-gauge-storage-sb">
            <div class="gauge-track">
              <div class="gauge-fill"></div>
            </div>
            <div class="gauge-value">156</div>
            <div class="gauge-label">GB / 256GB</div>
          </div>
        </div>
        
        <div class="demo-section">
          <h3>Multiple Gauges</h3>
          <div class="gauge-grid">
            <div class="ease-gauge-neon-sb ease-gauge-red-sb">
              <div class="gauge-track">
                <div class="gauge-fill"></div>
              </div>
              <div class="gauge-value">90</div>
              <div class="gauge-label">%</div>
            </div>
            
            <div class="ease-gauge-neon-sb ease-gauge-purple-sb">
              <div class="gauge-track">
                <div class="gauge-fill"></div>
              </div>
              <div class="gauge-value">65</div>
              <div class="gauge-label">%</div>
            </div>
            
            <div class="ease-gauge-neon-sb ease-gauge-blue-sb">
              <div class="gauge-track">
                <div class="gauge-fill"></div>
              </div>
              <div class="gauge-value">45</div>
              <div class="gauge-label">%</div>
            </div>
          </div>
        </div>
        
        <div class="demo-section">
          <h3>Elastic Animation Demo</h3>
          <div class="ease-gauge-neon-sb ease-gauge-elastic-sb">
            <div class="gauge-track">
              <div class="gauge-fill"></div>
            </div>
            <div class="gauge-value">50</div>
            <div class="gauge-label">%</div>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
