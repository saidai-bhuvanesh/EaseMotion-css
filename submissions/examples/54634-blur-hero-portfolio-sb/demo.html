<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blur-Entrance Hero Section - Creative Portfolio</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <section class="ease-hero-sb">
    <div class="ease-hero-bg-shapes-sb">
      <div class="ease-hero-shape-sb"></div>
      <div class="ease-hero-shape-sb"></div>
      <div class="ease-hero-shape-sb"></div>
    </div>
    
    <div class="ease-hero-content-sb">
      <div class="ease-hero-badge-sb">
        ✨ Featured Portfolio
      </div>
      
      <h1 class="ease-hero-title-sb">
        Create Stunning
        <span>Digital Experiences</span>
      </h1>
      
      <p class="ease-hero-desc-sb">
        Transform your creative vision into reality with our cutting-edge CSS framework. 
        Beautiful animations, seamless interactions, and pixel-perfect designs.
      </p>
      
      <div class="ease-hero-cta-sb">
        <a href="#" class="ease-hero-btn-sb ease-hero-btn-primary-sb">
          View My Work
        </a>
        <a href="#" class="ease-hero-btn-sb ease-hero-btn-secondary-sb">
          Get In Touch
        </a>
      </div>
      
      <div class="ease-hero-stats-sb">
        <div class="ease-hero-stat-sb">
          <div class="ease-hero-stat-value-sb">150+</div>
          <div class="ease-hero-stat-label-sb">Projects</div>
        </div>
        <div class="ease-hero-stat-sb">
          <div class="ease-hero-stat-value-sb">50+</div>
          <div class="ease-hero-stat-label-sb">Clients</div>
        </div>
        <div class="ease-hero-stat-sb">
          <div class="ease-hero-stat-value-sb">8+</div>
          <div class="ease-hero-stat-label-sb">Years Exp</div>
        </div>
      </div>
    </div>
    
    <div class="ease-hero-scroll-sb">
      <span>Scroll Down</span>
      <div class="ease-hero-scroll-line-sb"></div>
    </div>
  </section>
</body>
</html>
