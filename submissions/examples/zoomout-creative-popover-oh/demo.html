<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Component: Zoom-Out Popover - Creative Portfolio</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">
    <header>
      <span class="badge">Creative Portfolio</span>
      <h1>Zoom-Out Popover</h1>
      <p class="subtitle">Creative zoom animation</p>
    </header>

    <div class="display-area">
      <div class="popover-container">
        <button class="creative-btn" aria-label="View project">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
        <div class="zoom-popover" role="tooltip">
          <div class="zoom-preview">
            <div class="preview-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <rect x="3" y="3" width="18" height="18" rx="2"/>
                <circle cx="8.5" cy="8.5" r="1.5"/>
                <path d="M21 15l-5-5L5 21"/>
              </svg>
            </div>
          </div>
          <div class="zoom-content">
            <h4>Brand Identity Project</h4>
            <p class="zoom-desc">Modern design system for tech startup</p>
            <div class="zoom-tags">
              <span class="tag">Branding</span>
              <span class="tag">UI/UX</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <section class="demo-section">
      <h3>Animation Variants</h3>
      <div class="variants-grid">
        <div class="popover-container">
          <button class="trigger-btn small">Zoom</button>
          <div class="zoom-popover zoom" role="tooltip"><p>Zoom animation</p></div>
        </div>
        <div class="popover-container">
          <button class="trigger-btn small">Scale</button>
          <div class="zoom-popover scale" role="tooltip"><p>Scale animation</p></div>
        </div>
        <div class="popover-container">
          <button class="trigger-btn small">Pop</button>
          <div class="zoom-popover pop" role="tooltip"><p>Pop animation</p></div>
        </div>
      </div>
    </section>

    <section class="demo-section">
      <h3>Color Themes</h3>
      <div class="themes-grid">
        <div class="popover-container">
          <button class="trigger-btn small theme-violet">Violet</button>
          <div class="zoom-popover theme-violet" role="tooltip"><p>Violet creative theme</p></div>
        </div>
        <div class="popover-container">
          <button class="trigger-btn small theme-orange">Orange</button>
          <div class="zoom-popover theme-orange" role="tooltip"><p>Orange creative theme</p></div>
        </div>
        <div class="popover-container">
          <button class="trigger-btn small theme-cyan">Cyan</button>
          <div class="zoom-popover theme-cyan" role="tooltip"><p>Cyan creative theme</p></div>
        </div>
      </div>
    </section>

  </main>

</body>
</html>
