<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enterprise Talent Intelligence Dashboard - Phase 21</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="cognitive-grid"></div>
  <div class="ambient-bg"><div class="blob blob-1"></div><div class="blob blob-2"></div></div>
  <div class="app-container">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo"><span class="logo-text">COGNITIVE // 21</span></div>
        <button class="sidebar-toggle" id="sidebar-toggle">☰</button>
      </div>
      <nav class="sidebar-nav">
        <a href="#workspace" class="nav-item active">Intelligent Workspace</a>
        <a href="#analytics" class="nav-item">Telemetry</a>
      </nav>
      <div class="sidebar-footer">
        <div class="status-indicator">
          <div class="status-dot"></div>
          <span>Active Orchestrator</span>
        </div>
      </div>
    </aside>
    <main class="main-content">
      <header class="top-bar">
        <div class="top-bar-left">
          <span class="badge-tag">Phase 21</span>
          <h1>Enterprise Talent Intelligence Dashboard</h1>
        </div>
      </header>
      
      <section class="workspace-section" id="workspace">
        <div class="talent-container">
  <div class="talent-sidebar">
    <h3>Candidates</h3>
    <div class="candidate-list">
      <div class="candidate-card active">
        <div class="avatar">JD</div>
        <div class="candidate-info">
          <h4>Jane Doe</h4>
          <span class="match-score">98% Match</span>
        </div>
      </div>
      <div class="candidate-card">
        <div class="avatar">JS</div>
        <div class="candidate-info">
          <h4>John Smith</h4>
          <span class="match-score">89% Match</span>
        </div>
      </div>
    </div>
  </div>
  <div class="talent-detail">
    <div class="profile-header">
      <h2>Jane Doe</h2>
      <span class="badge">Senior UX Engineer</span>
    </div>
    <div class="skills-grid">
      <div class="skill-bar"><span>CSS Architecture</span><div class="bar-outer"><div class="bar-inner" style="width:95%"></div></div></div>
      <div class="skill-bar"><span>Responsive Design</span><div class="bar-outer"><div class="bar-inner" style="width:90%"></div></div></div>
      <div class="skill-bar"><span>Accessibility (a11y)</span><div class="bar-outer"><div class="bar-inner" style="width:85%"></div></div></div>
    </div>
  </div>
</div>
      </section>
    </main>
  </div>
  <script>
    document.getElementById('sidebar-toggle').addEventListener('click', () => {
      document.getElementById('sidebar').classList.toggle('collapsed');
    });
  </script>
</body>
</html>
